name: Automation CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
    - name: Install Google Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
    - name: Run Unit Tests
      run: mvn clean test -Dsurefire.suiteXmlFiles=testng-unit.xml

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: success()
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
    - name: Run Integration Tests
      run: mvn test -Dsurefire.suiteXmlFiles=testng-integration.xml

  system-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    if: success()
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
    - name: Run System Tests
      run: mvn test -Dsurefire.suiteXmlFiles=testng-system.xml
